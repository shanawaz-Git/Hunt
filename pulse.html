<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Daily Pulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #0e0d0b;
      --paper: #f5f0e8;
      --cream: #ede8dc;
      --red: #c0392b;
      --red-dim: #8b2218;
      --gold: #b5922a;
      --muted: #6b6560;
      --rule: #2a2a2a;
      --col-gap: 28px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--ink);
      color: var(--paper);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 17px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Loader ────────────────────────────────────────── */
    #loader {
      position: fixed; inset: 0;
      background: var(--ink);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999;
      transition: opacity 0.7s ease;
    }
    #loader.hide { opacity: 0; pointer-events: none; }
    .loader-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--paper);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .loader-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 12px;
    }
    .loader-bar {
      width: 200px; height: 1px;
      background: var(--rule);
      margin-top: 32px; overflow: hidden;
    }
    .loader-fill {
      height: 100%; width: 0;
      background: var(--red);
      animation: fill 1.8s ease forwards;
    }
    @keyframes fill { to { width: 100%; } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Masthead ────────────────────────────────────────── */
    #masthead {
      border-bottom: 1px solid var(--rule);
      padding: 12px 0 0;
      position: sticky; top: 0; z-index: 100;
      background: var(--ink);
    }
    .masthead-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(16px, 4vw, 60px) 12px;
      border-bottom: 1px solid var(--rule);
    }
    .masthead-meta {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .masthead-logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--paper);
      text-align: center;
      flex: 1;
    }
    .masthead-logo span { color: var(--red); }
    .nav-strip {
      display: flex; gap: 0;
      overflow-x: auto;
      padding: 0 clamp(16px, 4vw, 60px);
      scrollbar-width: none;
    }
    .nav-strip::-webkit-scrollbar { display: none; }
    .nav-item {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 20px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .nav-item:hover, .nav-item.active {
      color: var(--paper);
      border-color: var(--red);
    }

    /* ── Layout ────────────────────────────────────────── */
    #main { padding: clamp(24px, 4vw, 60px) clamp(16px, 4vw, 60px); }

    /* ── Quote Banner ────────────────────────────────────── */
    .quote-banner {
      border-top: 3px double var(--rule);
      border-bottom: 3px double var(--rule);
      padding: 28px 0;
      text-align: center;
      margin-bottom: 48px;
      position: relative;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.8s ease 0.2s, transform 0.8s ease 0.2s;
    }
    .quote-banner.visible { opacity: 1; transform: translateY(0); }
    .quote-ornament {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
      color: var(--red);
      line-height: 0.4;
      display: block;
      margin-bottom: 16px;
    }
    .quote-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 2.5vw, 1.7rem);
      font-style: italic;
      font-weight: 400;
      color: var(--paper);
      max-width: 760px;
      margin: 0 auto;
      line-height: 1.5;
    }
    .quote-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 14px;
    }

    /* ── Section Header ────────────────────────────────── */
    .section-header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 28px;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .section-header.visible { opacity: 1; transform: translateY(0); }
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--paper);
      background: var(--red);
      padding: 4px 12px;
      white-space: nowrap;
    }
    .section-rule { flex: 1; height: 1px; background: var(--rule); }
    .section-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 2px;
    }

    /* ── News Grid ────────────────────────────────────── */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--col-gap);
      margin-bottom: 56px;
    }
    @media (max-width: 900px) { .news-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 600px) { .news-grid { grid-template-columns: 1fr; } }

    /* Featured = first card spans 2 cols */
    .news-grid .card:first-child {
      grid-column: span 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    @media (max-width: 900px) { .news-grid .card:first-child { grid-column: span 1; grid-template-columns: 1fr; } }

    /* ── Card ────────────────────────────────────────── */
    .card {
      border: 1px solid var(--rule);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.3s;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.3s;
    }
    .card.visible { opacity: 1; transform: translateY(0); }
    .card:hover { border-color: var(--red); }
    .card:hover .card-title { color: var(--red); }

    .card-image {
      width: 100%; aspect-ratio: 16/9;
      object-fit: cover; display: block;
      filter: grayscale(30%) contrast(1.05);
      transition: filter 0.4s;
    }
    .card:hover .card-image { filter: grayscale(0%) contrast(1.1); }
    .card-image-placeholder {
      width: 100%; aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1a1917 0%, #2a2825 50%, #1a1917 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .card-image-placeholder svg { opacity: 0.15; }

    .card-body { padding: 18px 20px 20px; }
    .card-source {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      font-weight: 700;
      line-height: 1.3;
      color: var(--paper);
      margin-bottom: 10px;
      transition: color 0.3s;
    }
    .card-desc {
      font-family: 'EB Garamond', serif;
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-link {
      display: inline-block;
      margin-top: 14px;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--red);
      text-decoration: none;
      border-bottom: 1px solid var(--red-dim);
      padding-bottom: 2px;
      transition: color 0.2s;
    }
    .card-link:hover { color: var(--paper); }

    /* Featured card inner layout */
    .news-grid .card:first-child .card-image,
    .news-grid .card:first-child .card-image-placeholder { aspect-ratio: unset; height: 100%; }
    .news-grid .card:first-child .card-title { font-size: clamp(1.2rem, 2vw, 1.6rem); }
    .news-grid .card:first-child .card-desc { -webkit-line-clamp: 5; }

    /* ── Entertainment strip (horizontal) ─────────────── */
    .ent-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--col-gap);
      margin-bottom: 56px;
    }
    @media (max-width: 700px) { .ent-grid { grid-template-columns: 1fr; } }

    .ent-card {
      border-top: 2px solid var(--rule);
      padding-top: 16px;
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .ent-card.visible { opacity: 1; transform: translateY(0); }
    .ent-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--red);
      opacity: 0.4;
      line-height: 1;
      margin-bottom: 8px;
    }
    .ent-source {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .ent-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--paper);
      line-height: 1.35;
      margin-bottom: 8px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .ent-title:hover { color: var(--red); }
    .ent-desc {
      font-size: 0.88rem;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Footer ────────────────────────────────────────── */
    footer {
      border-top: 3px double var(--rule);
      padding: 28px clamp(16px, 4vw, 60px);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 900;
      color: var(--muted);
    }
    .footer-logo span { color: var(--red); }
    .footer-note {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      text-align: right;
    }

    /* ── Error state ───────────────────────────────────── */
    .error-state {
      text-align: center; padding: 80px 20px;
    }
    .error-state h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem; color: var(--red); margin-bottom: 12px;
    }
    .error-state p {
      font-size: 0.9rem; color: var(--muted);
    }

    /* ── Divider ───────────────────────────────────────── */
    .divider {
      display: flex; align-items: center; gap: 16px;
      margin: 48px 0;
    }
    .divider-line { flex: 1; height: 1px; background: var(--rule); }
    .divider-diamond {
      width: 6px; height: 6px;
      background: var(--red);
      transform: rotate(45deg);
    }
  </style>
</head>
<body>

  <!-- Loader -->
  <div id="loader">
    <div class="loader-title">The Daily<span style="color:var(--red)"> Pulse</span></div>
    <div class="loader-sub">Curating your world...</div>
    <div class="loader-bar"><div class="loader-fill"></div></div>
  </div>

  <!-- Masthead -->
  <header id="masthead">
    <div class="masthead-top">
      <div class="masthead-meta" id="editionMeta">Edition · Loading...</div>
      <div class="masthead-logo">The Daily <span>Pulse</span></div>
      <div class="masthead-meta" id="lastUpdate">Fetching...</div>
    </div>
    <nav class="nav-strip">
      <div class="nav-item active" onclick="scrollTo('world')">World</div>
      <div class="nav-item" onclick="scrollTo('business')">Business</div>
      <div class="nav-item" onclick="scrollTo('entertainment')">Entertainment</div>
      <div class="nav-item" onclick="scrollTo('quote')">Quote of the Day</div>
    </nav>
  </header>

  <!-- Main Content -->
  <main id="main">
    <div id="content">
      <!-- Injected by JS -->
    </div>
  </main>

  <footer>
    <div class="footer-logo">The Daily <span>Pulse</span></div>
    <div class="footer-note">Curated by scheduler · Powered by NewsAPI &amp; Claude AI<br>Made with ❤ for Shanawaz &amp; Ragvi</div>
  </footer>

  <script>
    function scrollTo(id) {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      event.target.classList.add('active');
    }

    function imgOrPlaceholder(url, alt) {
      if (url) {
        return `<img class="card-image" src="${url}" alt="${escHtml(alt)}" onerror="this.outerHTML=placeholder()" loading="lazy">`;
      }
      return placeholder();
    }

    function placeholder() {
      return `<div class="card-image-placeholder">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="10" width="40" height="28" rx="2" stroke="white" stroke-width="2"/>
          <circle cx="17" cy="22" r="4" stroke="white" stroke-width="2"/>
          <path d="M4 34L14 24L20 30L30 20L44 34" stroke="white" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </div>`;
    }

    function escHtml(str) {
      return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderCard(article, index, isFeatured) {
      return `
        <div class="card" style="transition-delay:${index * 0.08}s" onclick="window.open('${escHtml(article.url)}','_blank')">
          ${imgOrPlaceholder(article.image, article.title)}
          <div class="card-body">
            <div class="card-source">${escHtml(article.source)}</div>
            <div class="card-title">${escHtml(article.title)}</div>
            ${article.description ? `<div class="card-desc">${escHtml(article.description)}</div>` : ''}
            ${article.url ? `<a class="card-link" href="${escHtml(article.url)}" target="_blank" onclick="event.stopPropagation()">Read full story →</a>` : ''}
          </div>
        </div>`;
    }

    function renderEntCard(article, index) {
      return `
        <div class="ent-card" style="transition-delay:${index * 0.1}s">
          <div class="ent-num">0${index + 1}</div>
          <div class="ent-source">${escHtml(article.source)}</div>
          <div class="ent-title" onclick="window.open('${escHtml(article.url)}','_blank')">${escHtml(article.title)}</div>
          ${article.description ? `<div class="ent-desc">${escHtml(article.description)}</div>` : ''}
        </div>`;
    }

    function sectionHeader(label, count, id) {
      return `
        <div class="section-header" id="${id}">
          <div class="section-label">${label}</div>
          <div class="section-rule"></div>
          <div class="section-count">${count} stories</div>
        </div>`;
    }

    async function loadContent() {
      try {
        const res = await fetch('https://fitness-app-backend-rouge.vercel.app?t=' + Date.now());
        if (!res.ok) throw new Error('No content yet');
        const data = await res.json();

        // Update masthead
        document.getElementById('editionMeta').textContent = data.date || 'Today\'s Edition';
        document.getElementById('lastUpdate').textContent =
          'Updated · ' + new Date(data.timestamp).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

        let html = '';

        // ── Quote banner ──
        html += `
          <div class="quote-banner" id="quote">
            <span class="quote-ornament">"</span>
            <div class="quote-text">${escHtml(data.quote)}</div>
            <div class="quote-tag">Quote of the Day</div>
          </div>`;

        // ── World News ──
        if (data.sections.world?.length) {
          html += sectionHeader('World News', data.sections.world.length, 'world');
          html += `<div class="news-grid">`;
          data.sections.world.forEach((a, i) => { html += renderCard(a, i); });
          html += `</div>`;
        }

        html += `<div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>`;

        // ── Business News ──
        if (data.sections.business?.length) {
          html += sectionHeader('Business & Markets', data.sections.business.length, 'business');
          html += `<div class="news-grid">`;
          data.sections.business.forEach((a, i) => { html += renderCard(a, i); });
          html += `</div>`;
        }

        html += `<div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>`;

        // ── Entertainment ──
        if (data.sections.entertainment?.length) {
          html += sectionHeader('Entertainment & Light Reads', data.sections.entertainment.length, 'entertainment');
          html += `<div class="ent-grid">`;
          data.sections.entertainment.forEach((a, i) => { html += renderEntCard(a, i); });
          html += `</div>`;
        }

        document.getElementById('content').innerHTML = html;

        // Animate in
        setTimeout(() => {
          document.querySelectorAll('.quote-banner, .section-header, .card, .ent-card').forEach(el => {
            el.classList.add('visible');
          });
        }, 100);

        // Hide loader
        setTimeout(() => {
          document.getElementById('loader').classList.add('hide');
        }, 1800);

      } catch (err) {
        document.getElementById('content').innerHTML = `
          <div class="error-state">
            <h2>No Edition Yet</h2>
            <p>The scheduler hasn't run yet today. Check back after midnight or trigger it manually.<br><br>
            <span style="font-family:'DM Mono',monospace;font-size:0.7rem;color:#555">${err.message}</span></p>
          </div>`;
        document.getElementById('loader').classList.add('hide');
      }
    }

    loadContent();
  </script>
</body>
</html>
