<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Index — Pages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg:        #f1ece1;
      --bg-alt:    #e8e1d2;
      --ink:       #1a1814;
      --ink-soft:  #5a5448;
      --rule:      #b8ad96;
      --accent:    #c2410c;
      --accent-2:  #1e3a5f;
      --shadow:    0 1px 0 #00000010, 0 2px 6px #00000008;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Fraunces", Georgia, serif;
      font-feature-settings: "ss01", "ss02";
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
    }

    body {
      background-image:
        radial-gradient(circle at 20% 10%, #00000008 0, transparent 40%),
        radial-gradient(circle at 80% 90%, #00000008 0, transparent 40%);
      padding: 48px 24px 80px;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
    }

    /* ---------- Header ---------- */
    header {
      border-bottom: 1px solid var(--rule);
      padding-bottom: 32px;
      margin-bottom: 40px;
      position: relative;
    }

    .meta {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 28px;
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .meta .dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
    }

    h1 {
      font-size: clamp(40px, 7vw, 78px);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.025em;
      font-style: italic;
      font-variation-settings: "opsz" 144;
    }

    h1 .reg {
      font-style: normal;
      font-weight: 600;
    }

    .sub {
      margin-top: 18px;
      font-size: 17px;
      color: var(--ink-soft);
      max-width: 56ch;
      line-height: 1.5;
    }

    /* ---------- Index column header ---------- */
    .col-head {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      align-items: center;
      gap: 20px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-soft);
      padding: 0 4px 12px;
      border-bottom: 1px dashed var(--rule);
      margin-bottom: 4px;
    }

    /* ---------- File list ---------- */
    .file-list {
      list-style: none;
    }

    .file-row {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      align-items: center;
      gap: 20px;
      padding: 18px 4px;
      border-bottom: 1px solid var(--rule);
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: background 200ms ease, padding 200ms ease;
    }

    .file-row:hover {
      background: var(--bg-alt);
      padding-left: 18px;
      padding-right: 18px;
    }

    .file-row .num {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      color: var(--ink-soft);
      font-variant-numeric: tabular-nums;
    }

    .file-row .name {
      font-family: "Fraunces", serif;
      font-size: 26px;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .file-row .name .ext {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 14px;
      color: var(--ink-soft);
      margin-left: 6px;
      letter-spacing: 0;
    }

    .file-row .open {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transform: translateX(-6px);
      transition: all 200ms ease;
    }

    .file-row:hover .open { opacity: 1; transform: translateX(0); }

    .file-row .arrow {
      display: inline-block;
      transition: transform 220ms ease;
    }

    .file-row:hover .arrow { transform: translateX(4px); }

    /* ---------- Empty / error states ---------- */
    .state {
      border: 1px dashed var(--rule);
      padding: 40px 32px;
      text-align: center;
      background: var(--bg-alt);
    }

    .state h2 {
      font-style: italic;
      font-weight: 400;
      font-size: 28px;
      margin-bottom: 12px;
    }

    .state p {
      color: var(--ink-soft);
      font-size: 15px;
      line-height: 1.6;
      max-width: 56ch;
      margin: 0 auto;
    }

    .state code {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      background: #00000010;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 13px;
    }

    .state pre {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      background: var(--ink);
      color: #f1ece1;
      padding: 14px 18px;
      border-radius: 4px;
      font-size: 12px;
      text-align: left;
      margin-top: 18px;
      overflow-x: auto;
      max-width: 460px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ---------- Footer ---------- */
    footer {
      margin-top: 56px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--ink-soft);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    footer a {
      color: var(--ink-soft);
      text-decoration: none;
      border-bottom: 1px dotted var(--rule);
    }

    footer a:hover { color: var(--accent); border-color: var(--accent); }

    /* ---------- Loading ---------- */
    .skeleton {
      height: 64px;
      background: linear-gradient(90deg, transparent, #00000008, transparent);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-bottom: 1px solid var(--rule);
    }

    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    /* ---------- Reveal animation ---------- */
    .file-row {
      opacity: 0;
      transform: translateY(8px);
      animation: rise 500ms ease forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: none; }
    }

    /* Mobile */
    @media (max-width: 600px) {
      body { padding: 32px 18px 64px; }
      .col-head, .file-row { grid-template-columns: 36px 1fr auto; gap: 14px; }
      .file-row .name { font-size: 20px; }
      .file-row .open { display: none; }
      .file-row:hover { padding-left: 4px; padding-right: 4px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <p class="meta">
        <span class="dot"></span>
        Directory Index
        <span>·</span>
        <span id="date"></span>
      </p>
      <h1>Pages in <span class="reg">this</span> folder</h1>
      <p class="sub">
        Auto-discovered HTML documents in the current directory. Add a new
        <code style="font-family:'JetBrains Mono',monospace;font-size:14px">.html</code>
        file alongside this one and refresh — it'll appear below.
      </p>
    </header>

    <div class="col-head">
      <span>№</span>
      <span>Filename</span>
      <span>Action</span>
    </div>

    <ul id="file-list" class="file-list" aria-live="polite">
      <li class="skeleton"></li>
      <li class="skeleton"></li>
      <li class="skeleton"></li>
    </ul>

    <footer>
      <span id="count">— files</span>
      <span>Refresh to re-scan</span>
    </footer>
  </main>

  <script>
    // ---------- Date stamp ----------
    document.getElementById("date").textContent = new Date().toLocaleDateString(
      undefined,
      { year: "numeric", month: "short", day: "2-digit" }
    );

    // ---------- Load directory listing ----------
    async function loadFiles() {
      const list = document.getElementById("file-list");
      const count = document.getElementById("count");

      // file:// protocol can't fetch — guide the user
      if (location.protocol === "file:") {
        renderState(
          "Serve this folder with a local server",
          `Browsers block directory access on <code>file://</code>. Run one of these
           in this folder, then open the page at the URL it gives you:`,
          `# Python  (any version 3.x)
python -m http.server 8000

# Node.js
npx serve .

# PHP
php -S localhost:8000`
        );
        count.textContent = "— files";
        return;
      }

      try {
        const res = await fetch("./", { headers: { Accept: "text/html" } });
        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        const text = await res.text();

        const doc = new DOMParser().parseFromString(text, "text/html");
        const anchors = Array.from(doc.querySelectorAll("a"));

        const currentFile =
          decodeURIComponent(location.pathname.split("/").pop() || "") ||
          "index.html";

        const files = anchors
          .map(a => a.getAttribute("href") || "")
          .filter(h => h && !h.startsWith("?") && !h.startsWith("#"))
          .map(h => {
            try { return decodeURIComponent(h.split("?")[0].split("#")[0]); }
            catch { return h; }
          })
          .map(h => h.replace(/\/$/, "").split("/").pop())
          .filter(n => n && /\.html?$/i.test(n))
          .filter(n => n.toLowerCase() !== currentFile.toLowerCase())
          .filter((n, i, arr) => arr.indexOf(n) === i)
          .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

        if (files.length === 0) {
          renderState(
            "No other HTML files yet",
            `This folder doesn't contain any other <code>.html</code> files.
             Drop one in and refresh.`
          );
          count.textContent = "0 files";
          return;
        }

        list.innerHTML = "";
        files.forEach((name, i) => {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.className = "file-row";
          a.href = "./" + encodeURIComponent(name);
          a.style.animationDelay = (i * 50) + "ms";

          const displayName = name.replace(/\.html?$/i, "");
          const ext = name.match(/\.html?$/i)[0];

          a.innerHTML = `
            <span class="num">${String(i + 1).padStart(2, "0")}</span>
            <span class="name">${escapeHtml(displayName)}<span class="ext">${ext}</span></span>
            <span class="open">Open <span class="arrow">→</span></span>
          `;
          li.appendChild(a);
          list.appendChild(li);
        });

        count.textContent = `${files.length} ${files.length === 1 ? "file" : "files"}`;
      } catch (err) {
        renderState(
          "Couldn't read the directory",
          `The server didn't return a listing this page could parse. Most simple
           dev servers (Python's <code>http.server</code>, <code>npx serve</code>,
           <code>php -S</code>) work out of the box. Some production servers
           disable directory listings — in that case, you'll need to enable them
           or maintain a manifest.`,
          `Error: ${escapeHtml(err.message)}`
        );
        count.textContent = "— files";
      }
    }

    function renderState(title, html, pre) {
      const list = document.getElementById("file-list");
      list.innerHTML = `
        <li class="state">
          <h2>${escapeHtml(title)}</h2>
          <p>${html}</p>
          ${pre ? `<pre>${escapeHtml(pre)}</pre>` : ""}
        </li>
      `;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadFiles();
  </script>
</body>
</html>
