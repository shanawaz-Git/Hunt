<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Our Moments 💕</title>
    <style>
        :root {
            --primary-pink: #ff78aa;
            --soft-pink: #ffeaf4;
            --deep-rose: #d63384;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; /* Prevents text highlighting while dragging */
        }

        body {
            background: linear-gradient(135deg, var(--soft-pink) 0%, #ffffff 100%);
            text-align: center;
            overflow-x: hidden;
            color: #444;
            min-height: 100vh;
            touch-action: pan-y; /* Allows scrolling but captures horizontal drags */
        }

        header {
            padding: 30px 10px 10px;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--deep-rose);
        }

        /* Interactive Carousel */
        .stage {
            width: 100%;
            height: 350px;
            perspective: 1200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .carousel {
            width: 160px;
            height: 220px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s; /* Smoothness for dragging */
        }

        .carousel img {
            position: absolute;
            width: 160px;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            pointer-events: none; /* Prevents image dragging from breaking the script */
        }

        /* 7 Images - Dynamic spacing */
        .carousel img:nth-child(1) { transform: rotateY(0deg) translateZ(280px); }
        .carousel img:nth-child(2) { transform: rotateY(51.4deg) translateZ(280px); }
        .carousel img:nth-child(3) { transform: rotateY(102.8deg) translateZ(280px); }
        .carousel img:nth-child(4) { transform: rotateY(154.2deg) translateZ(280px); }
        .carousel img:nth-child(5) { transform: rotateY(205.6deg) translateZ(280px); }
        .carousel img:nth-child(6) { transform: rotateY(257deg) translateZ(280px); }
        .carousel img:nth-child(7) { transform: rotateY(308.4deg) translateZ(280px); }

        /* The Message Box */
        .interactive-section {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .reason-box {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 120, 170, 0.2);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-style: italic;
            transition: 0.3s;
            border: 2px dashed var(--primary-pink);
        }

        .btn-interact {
            background: var(--deep-rose);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(214, 51, 132, 0.3);
            transition: 0.2s;
        }

        .btn-interact:active { transform: scale(0.95); }

        /* Heart Burst Particles */
        .burst-heart {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            font-size: 20px;
            animation: burst 0.8s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; }
        }

        .hint {
            font-size: 0.8rem;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <header>Happy Valentine’s Day 💖</header>
    <p class="hint">Try dragging the photos! ☝️</p>

    <div class="stage" id="stage">
        <div class="carousel" id="carousel">
            <img src="WhatsApp Image 2026-02-14 at 12.38.18 AM.jpeg" />
            <img src="WhatsApp Image 2026-02-14 at 12.38.18 AM (1).jpeg" />
            <img src="WhatsApp Image 2026-02-14 at 12.38.18 AM (2).jpeg" />
            <img src="WhatsApp Image 2026-02-14 at 12.38.18 AM (3).jpeg" />
            <img src="WhatsApp Image 2026-02-14 at 12.38.18 AM (4).jpeg" />
            <img src="WhatsApp Image 2026-02-14 at 12.38.18 AM (5).jpeg" />
            <img src="WhatsApp Image 2026-02-14 at 12.38.18 AM (6).jpeg" />
        </div>
    </div>

    <div class="interactive-section">
        <div class="reason-box" id="reason-display">
            Click the button to see why you're amazing! ✨
        </div>
        <button class="btn-interact" onclick="nextReason()">Give me a reason! ❤️</button>
    </div>

    <script>
        // 1. DRAG ROTATION LOGIC
        const carousel = document.getElementById('carousel');
        let currAngle = 0;
        let startX = 0;
        let isDragging = false;

        // Auto-rotate initially
        let autoSpin = setInterval(() => {
            currAngle -= 0.5;
            carousel.style.transform = `rotateY(${currAngle}deg)`;
        }, 30);

        function startDrag(e) {
            isDragging = true;
            startX = e.pageX || e.touches[0].pageX;
            clearInterval(autoSpin);
        }

        function moveDrag(e) {
            if (!isDragging) return;
            const x = e.pageX || e.touches[0].pageX;
            const diff = (x - startX) * 0.5;
            currAngle += diff;
            carousel.style.transform = `rotateY(${currAngle}deg)`;
            startX = x;
        }

        function stopDrag() { isDragging = false; }

        window.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('mouseup', stopDrag);
        window.addEventListener('touchstart', startDrag);
        window.addEventListener('touchmove', moveDrag);
        window.addEventListener('touchend', stopDrag);

        // 2. HEART BURST EFFECT
        window.addEventListener('click', (e) => {
            for (let i = 0; i < 8; i++) {
                const heart = document.createElement('div');
                heart.className = 'burst-heart';
                heart.innerHTML = ['❤️','💖','✨','🌸'][Math.floor(Math.random()*4)];
                heart.style.left = e.clientX + 'px';
                heart.style.top = e.clientY + 'px';
                
                // Randomize trajectory
                const tx = (Math.random() - 0.5) * 200 + 'px';
                const ty = (Math.random() - 0.5) * 200 + 'px';
                heart.style.setProperty('--tx', tx);
                heart.style.setProperty('--ty', ty);
                
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 800);
            }
        });

        // 3. REASONS GENERATOR
        const reasons = [
            "You are my favorite G.U.N.D.U! 💫",
            "The way you handle things is Unstoppable 🌟",
            "Your heart is the Kindest I know ❤️",
            "You make every moment Delightful 😊",
            "You are Unique in the best way possible 🌸",
            "Your smile is my favorite view 💖",
            "Thank you for being my teammate in life 🥋"
        ];
        let reasonIdx = 0;

        function nextReason() {
            const box = document.getElementById('reason-display');
            box.style.opacity = 0;
            setTimeout(() => {
                box.innerText = reasons[reasonIdx];
                box.style.opacity = 1;
                reasonIdx = (reasonIdx + 1) % reasons.length;
            }, 200);
        }
    </script>
</body>
</html>
